# ============================================
# General
# ============================================

# Use bash as default shell (nushell can be launched manually inside panes)
set -g default-shell /bin/bash

# Prefix: C-Space. Doesn't clash with vim or shell readline.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color + italics
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# No escape delay - critical for vim responsiveness
set -sg escape-time 0

set -g history-limit 50000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on   # vim autoread works properly
set -g mouse on

# Window/pane numbering starts at 1 (keyboard order)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ============================================
# Keybinds
# ============================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "  tmux reloaded"

# Split with | and - , open in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation: Alt+hjkl, no prefix, no vim clash
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation: Alt+p/n
bind -n M-p previous-window
bind -n M-n next-window

# Resize panes with prefix + HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Sessionizer: prefix+f to fuzzy-pick a project
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Session list
bind s choose-tree -Zs

# Vi copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ============================================
# OneDark Theme
# ============================================

# bg       #282c34
# bg1      #353b45
# bg2      #3e4451
# fg       #abb2bf
# comment  #5c6370
# blue     #61afef
# green    #98c379
# yellow   #e5c07b
# red      #e06c75
# purple   #c678dd
# cyan     #56b6c2

# Pane borders
set -g pane-border-style        "fg=#3e4451"
set -g pane-active-border-style "fg=#61afef"

# Messages
set -g message-style         "bg=#353b45,fg=#abb2bf"
set -g message-command-style "bg=#353b45,fg=#abb2bf"

# Copy mode highlight
set -g mode-style "bg=#3e4451,fg=#e5c07b"

# Status bar
set -g status on
set -g status-position bottom
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left-length  40
set -g status-right-length 60

# Left: session name pill
set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef,nobold]  "

# Right: time
set -g status-right "#[fg=#5c6370] #[fg=#abb2bf,bg=#353b45] %H:%M  %d %b #[bg=#282c34,fg=#353b45]"

# Windows
set -g window-status-format         "#[fg=#5c6370] #I  #W "
set -g window-status-current-format "#[bg=#353b45,fg=#61afef,bold] #I  #W #[bg=#282c34,fg=#353b45,nobold]"
set -g window-status-separator      ""
